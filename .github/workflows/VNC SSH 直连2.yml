name: GitHub Actions VNC Desktop 2
on: workflow_dispatch

jobs:
  vnc-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ========== 1. 安装 Python 3.10 并设为系统唯一 python ==========
      - name: Install Python 3.10
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.10 python3.10-venv python3.10-distutils
          
          # 安装旧版 pip (21.x 兼容性好)
          curl -sL https://bootstrap.pypa.io/pip/3.10/get-pip.py -o get-pip.py
          python3.10 get-pip.py pip==21.3.1
          
          # 设为系统唯一 python
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3.10 1
          sudo update-alternatives --set python /usr/bin/python3.10
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.10 1
          sudo update-alternatives --set python3 /usr/bin/python3.10
          
          # 修复 apt_pkg (为 python3.10 重新链接)
          sudo ln -sf /usr/lib/python3/dist-packages/apt_pkg.cpython-312-x86_64-linux-gnu.so /usr/lib/python3/dist-packages/apt_pkg.so 2>/dev/null || true
          
          python --version
          python -m pip --version

      # ========== 2. 安装桌面环境 ==========
      - name: Install dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            openbox obconf \
            lxpanel pcmanfm \
            xterm \
            tigervnc-standalone-server \
            xfonts-base xfonts-75dpi xfonts-100dpi \
            fontconfig \
            autocutsel \
            curl wget

      # ========== 3. 配置 VNC ==========
      - name: Setup VNC
        run: |
          mkdir -p ~/.vnc
          echo "github" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          touch ~/.Xauthority

      # ========== 4. 启动 VNC + Openbox ==========
      - name: Start VNC Server
        run: |
          vncserver -kill :1 2>/dev/null || true
          rm -f /tmp/.X1-lock /tmp/.X11-unix/X1
          vncserver :1 -geometry 1280x720 -depth 24 -localhost no -xstartup /usr/bin/openbox-session
          sleep 3

      # ========== 5. 启动桌面组件 ==========
      - name: Start Desktop
        run: |
          DISPLAY=:1 lxpanel &
          DISPLAY=:1 pcmanfm --desktop &
          sleep 2

      # ========== 6. 启动 bore.pub 隧道 ==========
      - name: Expose VNC via bore.pub
        run: |
          curl -sL https://api.github.com/repos/ekzhang/bore/releases/latest | \
            grep "browser_download_url.*x86_64-unknown-linux-musl" | \
            cut -d '"' -f 4 | wget -i - -O bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          
          nohup ./bore local 5901 --to bore.pub > bore.log 2>&1 &
          sleep 5

      # ========== 7. 打印 VNC 连接信息 ==========
      - name: Print VNC info
        run: |
          BORE_PORT=$(grep -oP 'listening at bore.pub:\K\d+' bore.log | head -1)
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    🖥️  VNC 连接信息                         ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  地址: bore.pub:${BORE_PORT}                                 ║"
          echo "║  密码: github                                              ║"
          echo "║                                                            ║"
          echo "║  使用 AVNC 连接 bore.pub:${BORE_PORT}                        ║"
          echo "╚════════════════════════════════════════════════════════════╝"

      # ========== 8. 启动 tmate（后台模式）==========
      - name: Start tmate in background
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          limit-access-to-actor: true

      # ========== 9. 等待 tmate 就绪并打印 SSH 地址 ==========
      - name: Print SSH info
        run: |
          # 等待 tmate socket 出现
          for i in {1..30}; do
            TMATE_SOCK=$(ls /tmp/tmate-*.sock 2>/dev/null | head -1)
            if [ -n "$TMATE_SOCK" ]; then
              break
            fi
            sleep 1
          done
          
          # 等待 tmate 就绪
          for i in {1..30}; do
            SSH_LINE=$(tmate -S "$TMATE_SOCK" display -p '#{tmate_ssh}' 2>/dev/null)
            if [ -n "$SSH_LINE" ] && [ "$SSH_LINE" != "" ]; then
              break
            fi
            sleep 1
          done
          
          WEB_LINE=$(tmate -S "$TMATE_SOCK" display -p '#{tmate_web}' 2>/dev/null || echo "")
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    🔗 SSH 连接信息                          ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          if [ -n "$SSH_LINE" ] && [ "$SSH_LINE" != "" ]; then
            echo "║  🔑 SSH: ${SSH_LINE}                                         ║"
            [ -n "$WEB_LINE" ] && echo "║  🌐 Web: ${WEB_LINE}                                         ║"
          else
            echo "║  ⚠️  无法获取 tmate 地址，请检查日志                         ║"
          fi
          echo "╚════════════════════════════════════════════════════════════╝"

      # ========== 10. 保持运行（阻塞，exit 后结束）==========
      - name: Keep alive
        run: |
          echo "服务运行中..."
          echo "SSH 连接: 使用上面的 SSH 地址"
          echo "VNC 连接: 使用上面的 bore.pub 地址"
          echo ""
          echo "输入 exit 断开 SSH 后会自动关闭所有服务"
          echo "或按 Ctrl+C / 等待 timeout 结束"
          sleep 3600

      # ========== 11. 用户 exit 后自动关闭 ==========
      - name: Cleanup and shutdown
        if: always()
        run: |
          echo "SSH 会话已结束，正在清理..."
          vncserver -kill :1 2>/dev/null || true
          killall bore 2>/dev/null || true
