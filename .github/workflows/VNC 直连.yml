name: GitHub Actions VNC Desktop
on: workflow_dispatch

jobs:
  vnc-desktop:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== 1. 安装 Python 3.10 ==========
      - name: Setup Python 3.10
        run: |
          python3 --version
          python3 -m pip install --upgrade "pip==21.3.1"
          python3 -m pip --version

      # ========== 2. 更新系统并创建目录 ==========
      - name: Update system and create directories
        run: |
          sudo apt-get update
          mkdir -p outputs
          mkdir -p upload

      # ========== 3. 配置 Git ==========
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # ========== 4. 安装桌面环境 ==========
      - name: Install dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            openbox obconf \
            lxpanel pcmanfm \
            xterm \
            tigervnc-standalone-server \
            xfonts-base xfonts-75dpi xfonts-100dpi \
            fontconfig \
            autocutsel \
            curl wget

      # ========== 5. 配置 VNC ==========
      - name: Setup VNC
        run: |
          mkdir -p ~/.vnc
          echo "github" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          touch ~/.Xauthority

      # ========== 6. 启动 VNC + Openbox ==========
      - name: Start VNC Server
        run: |
          vncserver -kill :1 2>/dev/null || true
          rm -f /tmp/.X1-lock /tmp/.X11-unix/X1
          vncserver :1 -geometry 1280x720 -depth 24 -localhost no -xstartup /usr/bin/openbox-session
          sleep 3

      # ========== 7. 启动桌面组件 ==========
      - name: Start Desktop
        run: |
          DISPLAY=:1 lxpanel &
          DISPLAY=:1 pcmanfm --desktop &
          sleep 2

      # ========== 8. 启动 bore.pub 隧道 ==========
      - name: Expose VNC via bore.pub
        run: |
          curl -sL https://api.github.com/repos/ekzhang/bore/releases/latest | \
            grep "browser_download_url.*x86_64-unknown-linux-musl" | \
            cut -d '"' -f 4 | wget -i - -O bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          
          nohup ./bore local 5901 --to bore.pub > bore.log 2>&1 &
          sleep 5

      # ========== 9. 打印 VNC 连接信息 ==========
      - name: Print VNC info
        run: |
          BORE_PORT=$(grep -oP 'listening at bore.pub:\K\d+' bore.log | head -1)
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    🖥️  VNC 连接信息                         ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  地址: bore.pub:${BORE_PORT}                                 ║"
          echo "║  密码: github                                              ║"
          echo "╚════════════════════════════════════════════════════════════╝"

      # ========== 10. 启动 tmate（阻塞模式，exit 后自动结束）==========
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@master

      # ========== 11. 用户 exit 后：提交 upload 文件到仓库 ==========
      - name: Commit files to repository
        if: always()
        run: |
          if [ -d "upload" ] && [ -n "$(ls -A upload 2>/dev/null)" ]; then
            echo "发现新文件，准备提交到仓库..."
            
            for item in upload/*; do
              if [ -f "$item" ]; then
                cp "$item" ./
                git add "$(basename "$item")"
              elif [ -d "$item" ]; then
                dirname=$(basename "$item")
                rm -rf "./$dirname" 2>/dev/null
                cp -r "$item" ./
                git add "$dirname"
              fi
            done
            
            if ! git diff --cached --quiet; then
              git commit -m "Add files from GitHub Actions [skip ci]"
              git push
              echo "✅ 文件已提交到仓库"
            else
              echo "没有新文件需要提交"
            fi
          else
            echo "upload 目录为空，没有文件需要提交"
          fi

      # ========== 12. 上传 outputs 目录 ==========
      - name: Upload outputs directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: my-outputs
          path: outputs/
          if-no-files-found: warn

      # ========== 13. 清理 ==========
      - name: Cleanup
        if: always()
        run: |
          echo "正在清理..."
          vncserver -kill :1 2>/dev/null || true
          killall bore 2>/dev/null || true
