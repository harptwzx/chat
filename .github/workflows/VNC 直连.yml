name: GitHub Actions VNC Desktop
on: workflow_dispatch

jobs:
  vnc-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ========== 1. 安装 Python 3.10（不替换系统 python3）==========
      - name: Install Python 3.10
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.10 python3.10-venv python3-pip
          python3.10 -m ensurepip --upgrade || true
          python3.10 -m pip install --upgrade pip
          python3.10 --version
          python3.10 -m pip --version

      # ========== 2. 安装桌面环境 ==========
      - name: Install dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            openbox obconf \
            lxpanel pcmanfm \
            xterm \
            tigervnc-standalone-server \
            xfonts-base xfonts-75dpi xfonts-100dpi \
            fontconfig \
            autocutsel \
            curl wget

      # ========== 3. 配置 VNC ==========
      - name: Setup VNC
        run: |
          mkdir -p ~/.vnc
          echo "github" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          touch ~/.Xauthority

      # ========== 4. 启动 VNC + Openbox ==========
      - name: Start VNC Server
        run: |
          vncserver -kill :1 2>/dev/null || true
          rm -f /tmp/.X1-lock /tmp/.X11-unix/X1
          vncserver :1 -geometry 1280x720 -depth 24 -localhost no -xstartup /usr/bin/openbox-session
          sleep 3

      # ========== 5. 启动桌面组件 ==========
      - name: Start Desktop
        run: |
          DISPLAY=:1 lxpanel &
          DISPLAY=:1 pcmanfm --desktop &
          sleep 2

      # ========== 6. 启动 bore.pub 隧道 ==========
      - name: Expose VNC via bore.pub
        run: |
          curl -sL https://api.github.com/repos/ekzhang/bore/releases/latest | \
            grep "browser_download_url.*x86_64-unknown-linux-musl" | \
            cut -d '"' -f 4 | wget -i - -O bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          
          nohup ./bore local 5901 --to bore.pub > bore.log 2>&1 &
          sleep 5
          
          cat bore.log
          echo ""
          echo "========================================"
          echo "🖥️  VNC 连接信息"
          echo "========================================"
          grep "listening at" bore.log
          echo "密码: github"
          echo "========================================"

      # ========== 7. 启动 tmate（阻塞模式，exit 后自动结束）==========
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          detached: false
          limit-access-to-actor: true

      # ========== 8. 用户 exit 后自动关闭 ==========
      - name: Cleanup and shutdown
        if: always()
        run: |
          echo "SSH 会话已结束，正在清理..."
          vncserver -kill :1 2>/dev/null || true
          killall bore 2>/dev/null || true
