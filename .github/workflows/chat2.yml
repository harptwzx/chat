name: Remote SSH Debug (Start AI)

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update system packages
        run: sudo apt-get update

      - name: Create directories
        run: |
          mkdir -p outputs
          mkdir -p upload

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@master

      - name: Commit files to repository
        if: always()
        run: |
          if [ -d "upload" ] && [ -n "$(ls -A upload 2>/dev/null)" ]; then
            echo "发现新文件，准备提交到仓库..."
            
            for item in upload/*; do
              if [ -f "$item" ]; then
                cp "$item" ./
                git add "$(basename "$item")"
              elif [ -d "$item" ]; then
                dirname=$(basename "$item")
                rm -rf "./$dirname" 2>/dev/null
                cp -r "$item" ./
                git add "$dirname"
              fi
            done
            
            if ! git diff --cached --quiet; then
              git commit -m "Add files from GitHub Actions [skip ci]"
              git push
              echo "✅ 文件已提交到仓库"
            else
              echo "没有新文件需要提交"
            fi
          else
            echo "upload 目录为空，没有文件需要提交"
          fi

      - name: Upload outputs directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: my-outputs
          path: outputs/
          if-no-files-found: warn