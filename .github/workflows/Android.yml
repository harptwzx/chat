name: Android CI

on:
  push:
    paths:
      - 'Traffic/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'Traffic/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build Debug APK
        run: |
          cd Traffic
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Traffic-debug-apk
          path: Traffic/app/build/outputs/apk/debug/*.apk