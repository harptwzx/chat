name: Build Traffic APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'Traffic/**'
      - '.github/workflows/traffic-local.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: Traffic
          gradle-version: 8.10.2  # 使用 "8.0" 而不是 "8"
          arguments: assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: traffic-app-debug
          path: Traffic/app/build/outputs/apk/debug/*.apk