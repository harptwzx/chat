name: Build Traffic APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'Traffic/**'
      - '.github/workflows/traffic-local.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Display build files for debug
        run: |
          echo "=== Root build.gradle ==="
          cat Traffic/build.gradle
          echo ""
          echo "=== settings.gradle ==="
          cat Traffic/settings.gradle
          echo ""
          if [ -f "Traffic/app/build.gradle" ]; then
            echo "=== app/build.gradle ==="
            cat Traffic/app/build.gradle
          else
            echo "⚠️ app/build.gradle not found"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle Wrapper
        run: |
          cd Traffic
          if [ ! -f "gradlew" ]; then
            echo "Generating Gradle wrapper..."
            gradle wrapper --gradle-version 8.10.2
            chmod +x gradlew
          fi

      - name: Build with Gradle
        run: |
          cd Traffic
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: traffic-app-debug
          path: Traffic/app/build/outputs/apk/debug/*.apk