name: Check Build Files

on:
  workflow_dispatch:

jobs:
  check-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Display build.gradle
        run: |
          echo "=== Root build.gradle ==="
          cat Traffic/build.gradle
          echo ""
          echo "=== Settings.gradle ==="
          cat Traffic/settings.gradle
          echo ""
          echo "=== App build.gradle ==="
          cat Traffic/app/build.gradle 2>/dev/null || echo "app/build.gradle not found"

      - name: Check Android plugin version
        run: |
          grep -r "com.android" Traffic/*.gradle Traffic/**/*.gradle 2>/dev/null || echo "No Android plugin found"