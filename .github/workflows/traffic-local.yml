name: Build Traffic APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'Traffic/**'
      - '.github/workflows/traffic-local.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - List Traffic directory
        run: |
          ls -la Traffic/
          echo "---"
          find Traffic/ -name "*.gradle" -type f  # 查找所有 gradle 文件

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: Traffic
          gradle-version: 8.10.2
          arguments: tasks  # 先列出可用的任务，而不是直接 build

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: traffic-app-debug
          path: Traffic/app/build/outputs/apk/debug/*.apk