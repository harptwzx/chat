name: Build Traffic APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 用这个 action 安装 Gradle 8.10.2 到指定路径
      - name: Install Gradle 8.10.2
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.10.2
          # 只安装不构建
          arguments: --version
        id: gradle-install

      # 用刚安装的 Gradle 8.10.2 来生成 wrapper
      - name: Generate Gradle Wrapper
        run: |
          cd Traffic
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi

      - name: Build with Gradle
        run: |
          cd Traffic
          gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: traffic-app-debug
          path: Traffic/app/build/outputs/apk/debug/*.apk