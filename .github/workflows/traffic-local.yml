name: Show Traffic Directory Tree

on:
  workflow_dispatch:

jobs:
  show-tree:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tree command
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Show Traffic directory tree
        run: |
          echo "=== Traffic Directory Structure ==="
          echo ""
          tree -L 3 Traffic/ -a --dirsfirst
          echo ""
          echo "=== Alternative: Detailed ls ==="
          ls -laR Traffic/ | head -100

      - name: Check for Android files
        run: |
          echo "=== Looking for AndroidManifest.xml ==="
          find Traffic/ -name "AndroidManifest.xml" -type f
          echo ""
          echo "=== Looking for build.gradle files ==="
          find Traffic/ -name "build.gradle" -o -name "build.gradle.kts" -o -name "settings.gradle" -o -name "settings.gradle.kts"
          echo ""
          echo "=== Looking for gradle wrapper ==="
          find Traffic/ -name "gradlew" -o -name "gradle-wrapper.jar"