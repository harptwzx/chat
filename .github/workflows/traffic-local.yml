name: Build Traffic APK Root

on:
  workflow_dispatch:
  push:
    paths:
      - 'Traffic/**'
      - '.github/workflows/traffic-local.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build Debug APK
        run: |
          cd Traffic
          ./gradlew assembleDebug
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: traffic-app-debug
          path: Traffic/app/build/outputs/apk/debug/*.apk
